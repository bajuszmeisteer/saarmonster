<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SaarMonster</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:white;
  text-align:center;
  padding:40px;
}

h1{
  color:#3ddc00;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

table{
  margin:auto;
  border-collapse:collapse;
  width:90%;
  max-width:500px;
}

th,td{
  padding:12px;
  border:1px solid #333;
}

th{
  background:#1b1b1b;
}

.sale{
  color:#3ddc00;
  font-weight:bold;
}

.normal{
  color:#aaa;
}

.cheapest{
  color:#ffd700;
  font-weight:bold;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>
  <img src="monster.png" height="40" alt="Monster Logo">
  SaarMonster
</h1>
<p>Monster Energy 500ml – Any Flavor</p>

<table id="priceTable">
<tr>
<th>Store</th>
<th>Price (€)</th>
<th>Status</th>
</tr>
</table>

<p class="cheapest" id="cheapestStore"></p>

<script>
fetch("prices.json")
.then(r=>r.json())
.then(data=>{
  const table=document.getElementById("priceTable")
  let cheapest = data[0]

  data.forEach(store=>{
    const row=table.insertRow()
    row.insertCell(0).innerText=store.name
    row.insertCell(1).innerText=store.price.toFixed(2)

    const status=row.insertCell(2)
    if(store.price<=1){
      status.innerHTML="🔥 SALE"
      status.className="sale"
    }else{
      status.innerText="Normal"
      status.className="normal"
    }

    // Find cheapest store
    if(store.price < cheapest.price){
      cheapest = store
    }
  })

  document.getElementById("cheapestStore").innerText =
    `🏆 Cheapest this week: ${cheapest.name} – €${cheapest.price.toFixed(2)}`
})
</script>

</body>
</html>
