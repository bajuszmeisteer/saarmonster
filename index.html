<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SaarMonster</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:white;
  text-align:center;
  padding:40px;
}

h1{
  color:#3ddc00;
}

table{
  margin:auto;
  border-collapse:collapse;
  width:90%;
  max-width:500px;
}

th,td{
  padding:12px;
  border:1px solid #333;
}

th{
  background:#1b1b1b;
}

.sale{
  color:#3ddc00;
  font-weight:bold;
}

.normal{
  color:#aaa;
}
</style>
</head>

<body>

<h1>SaarMonster</h1>
<p>Monster Energy 500ml – Any Flavor</p>

<table id="priceTable">
<tr>
<th>Store</th>
<th>Price (€)</th>
<th>Status</th>
</tr>
</table>

<script>
fetch("prices.json")
.then(r=>r.json())
.then(data=>{
  const table=document.getElementById("priceTable")

  data.forEach(store=>{
    const row=table.insertRow()
    row.insertCell(0).innerText=store.name
    row.insertCell(1).innerText=store.price.toFixed(2)

    const status=row.insertCell(2)
    if(store.price<=1){
      status.innerHTML="🔥 SALE"
      status.className="sale"
    }else{
      status.innerText="Normal"
      status.className="normal"
    }
  })
})
</script>

</body>
</html>
